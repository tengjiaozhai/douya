<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Douya 知识库仪控台</title>
    <!-- 复古字体 -->
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* 复古配色 */
        --bg: #f4efdf;
        --card: #fdfbf7;
        --ink: #302b25;
        --muted: #736b5e;
        --line: #d1c5b4;
        --brand: #2b594b; /* 经典深石绿 */
        --accent: #b05c36; /* 铁锈红/陶土色 */
        --danger: #9e3636;
        --radius: 4px; /* 硬朗复古圆角 */
        --font-sans: 'IBM Plex Sans', -apple-system, sans-serif;
        --font-serif: 'Playfair Display', 'Georgia', serif;
        --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
        --shadow: 2px 2px 0px rgba(48, 43, 37, 0.1);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: var(--font-sans);
        background: var(--bg);
        background-image: radial-gradient(var(--line) 1px, transparent 1px);
        background-size: 20px 20px;
        color: var(--ink);
        line-height: 1.6;
      }

      .shell {
        max-width: 1200px;
        margin: 40px auto;
        padding: 40px;
        background: var(--card);
        border: 1px solid var(--line);
        box-shadow: 8px 8px 0px rgba(48, 43, 37, 0.06);
        border-radius: var(--radius);
      }

      h1, h2, h3 {
        margin: 0;
        font-family: var(--font-serif);
        color: var(--brand);
      }

      h1 {
        font-size: 36px;
        font-weight: 700;
        letter-spacing: 0.5px;
        border-bottom: 2px solid var(--line);
        padding-bottom: 16px;
        margin-bottom: 8px;
      }

      .sub {
        color: var(--muted);
        margin-top: 0;
        margin-bottom: 32px;
        font-style: italic;
        font-family: var(--font-serif);
        font-size: 16px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .metric {
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 20px;
        box-shadow: inset 1px 1px 0px #fff;
      }

      .metric .label {
        color: var(--muted);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .metric .value {
        margin-top: 8px;
        font-size: 28px;
        font-family: var(--font-serif);
        font-weight: 600;
        color: var(--brand);
      }

      /* Tabs */
      .tabs {
        display: flex;
        gap: 4px;
        border-bottom: 2px solid var(--brand);
        margin-bottom: 32px;
      }

      .tab-btn {
        background: transparent;
        border: 2px solid transparent;
        border-bottom: none;
        font-family: var(--font-serif);
        font-size: 18px;
        font-weight: 600;
        color: var(--muted);
        padding: 12px 24px;
        cursor: pointer;
        border-radius: var(--radius) var(--radius) 0 0;
        transition: all 0.2s;
      }

      .tab-btn:hover {
        color: var(--brand);
        background: var(--bg);
      }

      .tab-btn.active {
        background: var(--brand);
        color: #fff;
        border-color: var(--brand);
      }

      .tab-content {
        display: none;
        animation: fadeIn 0.3s ease;
      }

      .tab-content.active {
        display: block;
      }

      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(4px); }
        to { opacity: 1; transform: translateY(0); }
      }

      .panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 24px;
      }

      .panel-title {
        font-size: 24px;
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 20px;
        padding: 16px;
        background: var(--bg);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        flex-wrap: wrap;
      }

      input, textarea, select {
        font-family: var(--font-mono);
        font-size: 14px;
        width: 100%;
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 10px 12px;
        background: var(--card);
        color: var(--ink);
        transition: border-color 0.2s;
      }

      input:focus, textarea:focus {
        outline: none;
        border-color: var(--brand);
        box-shadow: 0 0 0 2px rgba(43, 89, 75, 0.1);
      }

      textarea {
        resize: vertical;
        line-height: 1.5;
      }

      button {
        font-family: var(--font-sans);
        font-weight: 500;
        font-size: 14px;
        border: 1px solid var(--brand);
        background: var(--brand);
        color: #fff;
        border-radius: var(--radius);
        padding: 8px 16px;
        cursor: pointer;
        transition: all 0.2s;
        white-space: nowrap;
        box-shadow: var(--shadow);
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 2px 3px 0px rgba(48, 43, 37, 0.15);
      }

      button:active {
        transform: translateY(1px);
        box-shadow: none;
      }

      button.secondary {
        background: #e3ddcd;
        color: var(--ink);
        border-color: #c4bca8;
      }

      button.danger {
        background: var(--danger);
        border-color: var(--danger);
      }

      button.ghost {
        background: transparent;
        color: var(--brand);
        border: 1px solid var(--brand);
        box-shadow: none;
      }

      button.ghost:hover {
        background: rgba(43, 89, 75, 0.05);
      }

      .split {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 32px;
      }

      .list {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        max-height: 700px;
        overflow: auto;
        background: #fff;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        position: sticky;
        top: 0;
        background: var(--bg);
        font-family: var(--font-serif);
        font-weight: 600;
        color: var(--brand);
        border-bottom: 2px solid var(--line);
        z-index: 10;
      }

      th, td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 12px 14px;
        font-size: 13px;
        vertical-align: top;
      }

      td {
        font-family: var(--font-mono);
      }

      tr {
        cursor: pointer;
        transition: background 0.1s;
      }

      tr:hover {
        background: #f7f4ea;
      }

      tr.active {
        background: #ede6d3;
        border-left: 3px solid var(--accent);
      }

      tr.active td:first-child {
        padding-left: 11px;
      }

      .editor {
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 24px;
        background: #faf7f0;
        box-shadow: inset 1px 1px 3px rgba(0,0,0,0.02);
      }

      .field {
        margin-bottom: 16px;
      }

      .field label {
        display: block;
        margin-bottom: 6px;
        color: var(--brand);
        font-size: 13px;
        font-weight: 600;
      }

      .field code {
        font-family: var(--font-mono);
        background: #e6e0cc;
        padding: 2px 4px;
        border-radius: 3px;
        color: var(--ink);
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 24px;
      }

      .foot {
        margin-top: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        padding-top: 16px;
        border-top: 1px solid var(--line);
      }

      .muted {
        color: var(--muted);
        font-size: 13px;
      }

      .status {
        margin-top: 16px;
        padding: 12px 16px;
        border-radius: var(--radius);
        font-size: 14px;
        font-family: var(--font-mono);
        display: none;
      }

      .status:not(:empty) {
        display: block;
      }

      .status.ok {
        background: #e8f0eb;
        color: var(--brand);
        border: 1px solid #cce0d5;
      }

      .status.err {
        background: #fdf5f5;
        color: var(--danger);
        border: 1px solid #f2d6d6;
      }

      @media (max-width: 900px) {
        .split {
          grid-template-columns: 1fr;
        }
        .shell {
          margin: 0;
          padding: 20px;
          border-radius: 0;
          box-shadow: none;
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <h1>Douya 个人知识库仪控台</h1>
      <p class="sub">统一查看与编辑 Chroma 向量库 + PageIndexRAG 文档库</p>

      <div class="summary">
        <div class="metric">
          <div class="label">Chroma Collection</div>
          <div id="m-collection" class="value">-</div>
        </div>
        <div class="metric">
          <div class="label">Chroma 向量分片</div>
          <div id="m-chunks" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">PageIndex 文档数</div>
          <div id="m-docs" class="value">0</div>
        </div>
        <div class="metric">
          <div class="label">PageIndex 页面/块</div>
          <div id="m-pages-chunks" class="value">0 / 0</div>
        </div>
      </div>

      <div class="tabs">
        <button class="tab-btn active" id="btn-chroma" onclick="switchTab('chroma')">Chroma 向量库</button>
        <button class="tab-btn" id="btn-page" onclick="switchTab('page')">PageIndex RAG 文档库</button>
      </div>

      <div id="tab-chroma" class="tab-content active">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">Chroma 数据库条目</h2>
            <button class="ghost" onclick="loadChroma()">更新视图</button>
          </div>

          <div class="toolbar">
            <input id="chroma-keyword" placeholder="关键词过滤（id/content/metadata）" style="flex: 1;" />
            <input id="chroma-doc-name" placeholder="按 metadata.documentName 精确过滤（可选）" style="flex: 1;" />
            <button onclick="searchChroma()">即刻查询</button>
          </div>

          <div class="split">
            <div class="list">
              <table>
                <thead>
                  <tr>
                    <th>识别码 (ID)</th>
                    <th>文档归属</th>
                    <th>摘要剪影</th>
                  </tr>
                </thead>
                <tbody id="chroma-rows"></tbody>
              </table>
              <div class="foot" style="padding: 12px 14px; border-top: none;">
                <div class="muted" id="chroma-page-info">-</div>
                <div class="actions" style="margin-top: 0;">
                  <button class="secondary" onclick="chromaPrev()">上一页</button>
                  <button class="secondary" onclick="chromaNext()">下一页</button>
                </div>
              </div>
            </div>

            <div class="editor">
              <div class="field">
                <label>选中卷帙 ID</label>
                <input id="chroma-id" readonly />
              </div>
              <div class="field">
                <label>正文内容 (Content) <code>将触发重算 Embedding</code></label>
                <textarea id="chroma-content" rows="10"></textarea>
              </div>
              <div class="field">
                <label>元数据 (Metadata) <code>格式须为合规 JSON</code></label>
                <textarea id="chroma-meta" rows="8"></textarea>
              </div>
              <div class="actions">
                <button onclick="saveChroma()">保存并覆写</button>
                <button class="danger" onclick="deleteChroma()">销毁该条目</button>
                <button class="secondary" onclick="clearChromaEditor()">清空检视面板</button>
              </div>
              <div id="chroma-status" class="status"></div>
            </div>
          </div>
        </section>
      </div>

      <div id="tab-page" class="tab-content">
        <section class="panel">
          <div class="panel-head">
            <h2 class="panel-title">PageIndex RAG 文档库</h2>
            <div class="actions" style="margin-top: 0;">
              <button class="ghost" onclick="loadPageDocs()">同步书库</button>
              <button onclick="newPageDoc()">草拟新卷</button>
            </div>
          </div>

          <div class="toolbar">
            <input id="page-keyword" placeholder="检索线索（doc_id/doc_name/version/metadata）" style="flex: 1;" />
            <button onclick="searchPageDocs()">发起检索</button>
          </div>

          <div class="split">
            <div class="list">
              <table>
                <thead>
                  <tr>
                    <th>唯一卷首码 (doc_id)</th>
                    <th>名录与修订版次</th>
                    <th>页数/拆分块</th>
                  </tr>
                </thead>
                <tbody id="page-rows"></tbody>
              </table>
              <div class="foot" style="padding: 12px 14px; border-top: none;">
                <div class="muted" id="page-page-info">-</div>
                <div class="actions" style="margin-top: 0;">
                  <button class="secondary" onclick="pagePrev()">上一页</button>
                  <button class="secondary" onclick="pageNext()">下一页</button>
                </div>
              </div>
            </div>

            <div class="editor">
              <div class="field">
                <label>文档卷首码 (doc_id) <code>首次入库留空以自动生成</code></label>
                <input id="page-doc-id" />
              </div>
              <div class="field">
                <label>文档名录 (doc_name)</label>
                <input id="page-doc-name" />
              </div>
              <div class="field">
                <label>修订版次 (version)</label>
                <input id="page-version" placeholder="例：v1 / v2 / 2026修订本" />
              </div>
              <div class="field">
                <label>元附记 (Metadata JSON)</label>
                <textarea id="page-meta" rows="6"></textarea>
              </div>
              <div class="field">
                <label>内文页面排版 <code>各页间以「 ---PAGE--- 」区隔</code></label>
                <textarea id="page-pages" rows="12"></textarea>
              </div>
              <div class="actions">
                <button onclick="savePageDoc()">封存并入库</button>
                <button class="danger" onclick="deletePageDoc()">焚毁此卷帙</button>
              </div>
              <div id="page-status" class="status"></div>
            </div>
          </div>
        </section>
      </div>
    </div>

    <script>
      const SEP = '\n\n---PAGE---\n\n';
      const chromaState = { limit: 20, offset: 0, total: 0, items: [], activeId: '' };
      const pageState = { limit: 20, offset: 0, total: 0, items: [], activeDocId: '' };

      function switchTab(tabId) {
        document.querySelectorAll('.tab-btn').forEach((btn) => btn.classList.remove('active'));
        document.querySelectorAll('.tab-content').forEach((content) => content.classList.remove('active'));
        document.getElementById('btn-' + tabId).classList.add('active');
        document.getElementById('tab-' + tabId).classList.add('active');
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { 'Content-Type': 'application/json', ...(options.headers || {}) },
          ...options,
        });
        const text = await response.text();
        let data = {};
        try {
          data = text ? JSON.parse(text) : {};
        } catch (_) {
          data = { status: 'FAILED', error: text || '返回数据非 JSON 规范' };
        }
        if (!response.ok) {
          throw new Error(data.error || data.message || `网络传驿故障 HTTP ${response.status}`);
        }
        return data;
      }

      function showStatus(elId, message, ok = true) {
        const el = document.getElementById(elId);
        el.className = `status ${ok ? 'ok' : 'err'}`;
        el.textContent = message;
      }

      function parseJsonText(raw, fallback = {}) {
        if (!raw || !raw.trim()) return fallback;
        try {
          const parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object' && !Array.isArray(parsed)) {
            return parsed;
          }
          throw new Error('此非标准 JSON 对象');
        } catch (e) {
          throw new Error(`JSON 解析失误: ${e.message}`);
        }
      }

      function escapeHtml(text = '') {
        return String(text).replace(/[&<>"']/g, (c) => ({
          '&': '&amp;',
          '<': '&lt;',
          '>': '&gt;',
          '"': '&quot;',
          "'": '&#39;',
        }[c]));
      }

      async function loadOverview() {
        try {
          const data = await api('/api/douya/kb/dashboard/overview');
          document.getElementById('m-collection').textContent =
            data?.chroma?.collection_name || '-';
          document.getElementById('m-chunks').textContent =
            data?.chroma?.total_chunks ?? 0;
          const storeStatus = data?.page_index_rag?.store_status || {};
          document.getElementById('m-docs').textContent = storeStatus.docs ?? 0;
          document.getElementById('m-pages-chunks').textContent =
            `${storeStatus.pages ?? 0} / ${storeStatus.chunks ?? 0}`;
        } catch (e) {
          console.error(e);
        }
      }

      function renderChromaRows() {
        const tbody = document.getElementById('chroma-rows');
        tbody.innerHTML = '';
        chromaState.items.forEach((item) => {
          const tr = document.createElement('tr');
          if (item.id === chromaState.activeId) tr.classList.add('active');
          const docName = item.metadata?.documentName || '-';
          const preview = (item.content || '').slice(0, 70); /* Shorter for single col */
          tr.innerHTML = `
            <td>${escapeHtml(item.id)}</td>
            <td>${escapeHtml(docName)}</td>
            <td>${escapeHtml(preview)}</td>
          `;
          tr.onclick = () => selectChroma(item);
          tbody.appendChild(tr);
        });
        const pageNo = Math.floor(chromaState.offset / chromaState.limit) + 1;
        const totalPage = Math.max(1, Math.ceil(chromaState.total / chromaState.limit));
        document.getElementById('chroma-page-info').textContent =
          `第 ${pageNo}/${totalPage} 卷，计 ${chromaState.total} 目`;
      }

      async function loadChroma() {
        const keyword = document.getElementById('chroma-keyword').value.trim();
        const documentName = document.getElementById('chroma-doc-name').value.trim();
        const url = new URL('/api/douya/kb/dashboard/chroma/items', window.location.origin);
        url.searchParams.set('limit', chromaState.limit);
        url.searchParams.set('offset', chromaState.offset);
        if (keyword) url.searchParams.set('keyword', keyword);
        if (documentName) url.searchParams.set('documentName', documentName);
        try {
          const data = await api(url.toString());
          chromaState.items = data.items || [];
          chromaState.total = data.total || 0;
          renderChromaRows();
        } catch (e) {
          showStatus('chroma-status', e.message, false);
        }
      }

      function searchChroma() {
        chromaState.offset = 0;
        loadChroma();
      }

      function chromaNext() {
        if (chromaState.offset + chromaState.limit >= chromaState.total) return;
        chromaState.offset += chromaState.limit;
        loadChroma();
      }

      function chromaPrev() {
        chromaState.offset = Math.max(0, chromaState.offset - chromaState.limit);
        loadChroma();
      }

      function selectChroma(item) {
        chromaState.activeId = item.id;
        document.getElementById('chroma-id').value = item.id || '';
        document.getElementById('chroma-content').value = item.content || '';
        document.getElementById('chroma-meta').value = JSON.stringify(item.metadata || {}, null, 2);
        renderChromaRows();
      }

      function clearChromaEditor() {
        chromaState.activeId = '';
        document.getElementById('chroma-id').value = '';
        document.getElementById('chroma-content').value = '';
        document.getElementById('chroma-meta').value = '{}';
        renderChromaRows();
        // Clear status
        document.getElementById('chroma-status').textContent = '';
        document.getElementById('chroma-status').className = 'status';
      }

      async function saveChroma() {
        const id = document.getElementById('chroma-id').value.trim();
        if (!id) {
          showStatus('chroma-status', '需先择一卷目方可保存', false);
          return;
        }
        const content = document.getElementById('chroma-content').value;
        if (!content.trim()) {
          showStatus('chroma-status', '文辞不可留白', false);
          return;
        }
        let metadata;
        try {
          metadata = parseJsonText(document.getElementById('chroma-meta').value, {});
        } catch (e) {
          showStatus('chroma-status', e.message, false);
          return;
        }

        try {
          await api(`/api/douya/kb/dashboard/chroma/items/${encodeURIComponent(id)}`, {
            method: 'PUT',
            body: JSON.stringify({ content, metadata }),
          });
          showStatus('chroma-status', `卷目 ${id} 已成功修补`);
          await loadChroma();
          await loadOverview();
        } catch (e) {
          showStatus('chroma-status', e.message, false);
        }
      }

      async function deleteChroma() {
        const id = document.getElementById('chroma-id').value.trim();
        if (!id) {
          showStatus('chroma-status', '需先择一条目方可销毁', false);
          return;
        }
        if (!confirm(`断然销毁 Chroma 卷目：${id} ？此操作不可逆返。`)) return;
        try {
          await api(`/api/douya/kb/dashboard/chroma/items/${encodeURIComponent(id)}`, {
            method: 'DELETE',
          });
          showStatus('chroma-status', `已成功将卷目燃尽：${id}`);
          clearChromaEditor();
          await loadChroma();
          await loadOverview();
        } catch (e) {
          showStatus('chroma-status', e.message, false);
        }
      }

      function renderPageRows() {
        const tbody = document.getElementById('page-rows');
        tbody.innerHTML = '';
        pageState.items.forEach((item) => {
          const tr = document.createElement('tr');
          const docId = item.doc_id || '';
          if (docId === pageState.activeDocId) tr.classList.add('active');
          tr.innerHTML = `
            <td>${escapeHtml(docId)}</td>
            <td>${escapeHtml(item.doc_name || '-')} <span class="muted">[${escapeHtml(item.version || '-')}]</span></td>
            <td>${item.page_count || 0} / ${item.chunk_count || 0}</td>
          `;
          tr.onclick = () => loadPageDocDetail(docId);
          tbody.appendChild(tr);
        });
        const pageNo = Math.floor(pageState.offset / pageState.limit) + 1;
        const totalPage = Math.max(1, Math.ceil(pageState.total / pageState.limit));
        document.getElementById('page-page-info').textContent =
          `第 ${pageNo}/${totalPage} 版，计 ${pageState.total} 部`;
      }

      async function loadPageDocs() {
        const keyword = document.getElementById('page-keyword').value.trim();
        const url = new URL('/api/douya/kb/dashboard/page-index/docs', window.location.origin);
        url.searchParams.set('limit', pageState.limit);
        url.searchParams.set('offset', pageState.offset);
        if (keyword) url.searchParams.set('keyword', keyword);
        try {
          const data = await api(url.toString());
          pageState.items = data.items || [];
          pageState.total = data.total || 0;
          renderPageRows();
        } catch (e) {
          showStatus('page-status', e.message, false);
        }
      }

      function searchPageDocs() {
        pageState.offset = 0;
        loadPageDocs();
      }

      function pageNext() {
        if (pageState.offset + pageState.limit >= pageState.total) return;
        pageState.offset += pageState.limit;
        loadPageDocs();
      }

      function pagePrev() {
        pageState.offset = Math.max(0, pageState.offset - pageState.limit);
        loadPageDocs();
      }

      function newPageDoc() {
        pageState.activeDocId = '';
        document.getElementById('page-doc-id').value = '';
        document.getElementById('page-doc-name').value = '';
        document.getElementById('page-version').value = '初版 v1';
        document.getElementById('page-meta').value = '{}';
        document.getElementById('page-pages').value = '';
        renderPageRows();
        showStatus('page-status', '已清卷理笔，请抒写。完成之后封存以入库。');
      }

      async function loadPageDocDetail(docId) {
        if (!docId) return;
        try {
          const data = await api(`/api/douya/kb/dashboard/page-index/docs/${encodeURIComponent(docId)}`);
          const doc = data.document || {};
          const pages = data.pages || [];
          pageState.activeDocId = docId;
          document.getElementById('page-doc-id').value = doc.doc_id || docId;
          document.getElementById('page-doc-name').value = doc.doc_name || '';
          document.getElementById('page-version').value = doc.version || 'v1';
          document.getElementById('page-meta').value = JSON.stringify(doc.metadata || {}, null, 2);
          const pageTexts = pages
            .sort((a, b) => (a.page_no || 0) - (b.page_no || 0))
            .map((p) => p.page_text || '');
          document.getElementById('page-pages').value = pageTexts.join(SEP);
          renderPageRows();
          showStatus('page-status', `已从书阁提取文献卷首码：${docId}`);
        } catch (e) {
          showStatus('page-status', e.message, false);
        }
      }

      async function savePageDoc() {
        const docId = document.getElementById('page-doc-id').value.trim();
        const docName = document.getElementById('page-doc-name').value.trim();
        const version = document.getElementById('page-version').value.trim() || 'v1';
        const pagesRaw = document.getElementById('page-pages').value;
        const pages = pagesRaw
          .split(/(?:\r?\n){1,}---PAGE---(?:\r?\n){1,}/g)
          .map((v) => v.trim())
          .filter(Boolean);
        if (!docName) {
          showStatus('page-status', '名录 (doc_name) 不得留空', false);
          return;
        }
        if (pages.length === 0) {
          showStatus('page-status', '文本内必须留有些许字迹', false);
          return;
        }

        let metadata;
        try {
          metadata = parseJsonText(document.getElementById('page-meta').value, {});
        } catch (e) {
          showStatus('page-status', e.message, false);
          return;
        }

        const payload = { doc_name: docName, version, metadata, pages };
        try {
          let result;
          if (docId) {
            result = await api(`/api/douya/kb/dashboard/page-index/docs/${encodeURIComponent(docId)}`, {
              method: 'PUT',
              body: JSON.stringify(payload),
            });
          } else {
            result = await api('/api/douya/kb/dashboard/page-index/docs', {
              method: 'POST',
              body: JSON.stringify(payload),
            });
            document.getElementById('page-doc-id').value = result.doc_id || '';
            pageState.activeDocId = result.doc_id || '';
          }
          showStatus(
            'page-status',
            `佳作已入库！卷首码：${result.doc_id || docId}。计入库 ${result.page_count || pages.length} 页，切出 ${result.chunk_count || '-'} 块。`
          );
          await loadPageDocs();
          await loadOverview();
        } catch (e) {
          showStatus('page-status', e.message, false);
        }
      }

      async function deletePageDoc() {
        const docId = document.getElementById('page-doc-id').value.trim();
        if (!docId) {
          showStatus('page-status', '需先择一文献方可焚毁', false);
          return;
        }
        if (!confirm(`断然焚毁 PageIndex 文献卷宗：${docId} ？灰飞之后，不再复得。`)) return;
        try {
          await api(`/api/douya/kb/dashboard/page-index/docs/${encodeURIComponent(docId)}`, {
            method: 'DELETE',
          });
          showStatus('page-status', `文献已作劫烬：${docId}`);
          newPageDoc();
          await loadPageDocs();
          await loadOverview();
        } catch (e) {
          showStatus('page-status', e.message, false);
        }
      }

      (async function init() {
        await loadOverview();
        await loadChroma();
        await loadPageDocs();
      })();
    </script>
  </body>
</html>
